stages:
  - test
  - build
  - release

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  TARGET: x86_64-unknown-linux-gnu

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/registry
    - .cargo/git
    - target/

test:
  stage: test
  image: rust:latest
  before_script:
    - cargo install cargo-nextest --locked
  script:
    - cargo nextest run --profile ci
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml

build:
  stage: build
  image: rust:latest
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
        sed -i "s/^version = .*/version = \"${VERSION}\"/" Cargo.toml
      fi
    - cargo build --release --target ${TARGET}
    - strip target/${TARGET}/release/ztop
    - cp target/${TARGET}/release/ztop ztop-linux-amd64
  artifacts:
    paths:
      - ztop-linux-amd64
    expire_in: 1 week

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "ztop ${CI_COMMIT_TAG}"
    description: "Release ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: ztop-linux-amd64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/ztop-linux-amd64?job=build"
          filepath: /ztop-linux-amd64
